<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-mesh"></div>
    <main class="container">
        <header>
            <h1>FocusFlow</h1>
            <p>Elevate your productivity.</p>
        </header>

        <section class="card form-card">
            <h2>Log Session</h2>
            <form id="focus-form">
                <div class="input-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="E.g. Omkar" required>
                </div>
                <div class="input-group">
                    <label for="studyDuration">Study Duration (mins)</label>
                    <input type="number" id="studyDuration" name="studyDuration" placeholder="120" required min="1">
                </div>
                <div class="input-group">
                    <label for="distractionTime">Distraction Time (mins)</label>
                    <input type="number" id="distractionTime" name="distractionTime" placeholder="30" required min="0">
                </div>
                <button type="submit" class="primary-btn">Calculate Focus</button>
            </form>
        </section>

        <section id="result-card" class="card result-card hidden">
            <h3>Your Focus Score</h3>
            <div class="score-circle">
                <span id="score-value">0.0</span>
            </div>
            <p id="score-message">Great job! Keep it up.</p>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
